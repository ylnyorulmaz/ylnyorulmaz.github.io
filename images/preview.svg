<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a192f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="60" fill="#3b82f6" opacity="0.1"/>
  <circle cx="1100" cy="530" r="80" fill="#3b82f6" opacity="0.1"/>
  <rect x="900" y="50" width="200" height="200" fill="#2563eb" opacity="0.05" rx="20"/>

  <!-- Main content -->
  <text x="600" y="200" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#e6f1ff" text-anchor="middle">
    Yalın Yorulmaz
  </text>

  <text x="600" y="280" font-family="Arial, sans-serif" font-size="32" fill="#94a3b8" text-anchor="middle">
    PMP® Certified Project Manager
  </text>

  <text x="600" y="330" font-family="Arial, sans-serif" font-size="32" fill="#94a3b8" text-anchor="middle">
    &amp; Full Stack Developer
  </text>

  <text x="600" y="420" font-family="Arial, sans-serif" font-size="28" fill="#60a5fa" text-anchor="middle" font-style="italic">
    Bridging product, security and engineering
  </text>

  <text x="600" y="470" font-family="Arial, sans-serif" font-size="28" fill="#60a5fa" text-anchor="middle" font-style="italic">
    for global teams
  </text>

  <!-- Footer badge -->
  <rect x="450" y="530" width="300" height="60" fill="url(#accentGrad)" rx="30"/>
  <text x="600" y="568" font-family="Arial, sans-serif" font-size="24" font-weight="600" fill="white" text-anchor="middle">
    ylnyorulmaz.github.io
  </text>
</svg>
